name: 글투 데이터 자동 업데이트
on:
  schedule:
    # 매일 오전 8시 30분 KST (UTC 23:30) — 장 시작 전 최신화
    - cron: "30 23 * * *"
  workflow_dispatch:  # 수동 실행 버튼도 제공
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
permissions:
  contents: write  # JSON 파일 커밋 권한
jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 저장소 체크아웃
        uses: actions/checkout@v4
      - name: 🐍 Python 3.11 세팅
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: 📦 의존성 설치
        run: pip install -r requirements.txt
      - name: 🚀 데이터 수집 실행
        env:
          CUSTOMS_API_KEY: ${{ secrets.CUSTOMS_API_KEY }}
        run: python scripts/collect_data.py
      - name: 💾 변경사항 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          git diff --cached --quiet || git commit -m "chore: 글투 데이터 자동 업데이트 $(date '+%Y-%m-%d %H:%M KST')"
          git push
